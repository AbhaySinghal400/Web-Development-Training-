<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Indicator</title>

    <style>
        *{
            margin: 100px;
            padding: 100px;
        }
        .loading-indicator {
            width: 40px;
            height: 40px;
            border: 5px solid white;
            border-top: 5px solid blue;
            border-left: 5px solid pink;
            border-right: 5px solid green;
            border-bottom: 5px solid yellow;
            border-radius: 50%;
            animation: loadingindicator 2s linear infinite;
        }

        @keyframes loadingindicator {
            0% { 
                transform: rotate(0deg); 
            }100%{
                 transform: rotate(720deg); 
            }
        }

      </style>  

</head>
<body>
    <div class="loading-indicator">
        <div>
        <img src="https://media-del3-2.cdn.whatsapp.net/v/t61.24694-24/544504135_1762162567793219_5344892711809135773_n.jpg?ccb=11-4&oh=01_Q5Aa4wHKRGAwDT0NZxLvT3xkKjFlLnf-RlN_52GNbX2qOQgGHg&oe=6A37A6C2&_nc_sid=5e03e0&_nc_cat=101" alt="Loading Indicator" width="400px" height="400px">
        </div>
        
    <div>    

</body>
</html>
